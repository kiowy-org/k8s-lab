apiVersion: v1
kind: Pod
metadata:
  name: kuard
spec:
  containers:
    - image: europe-west1-docker.pkg.dev/polytech-dijon/polytech-dijon/kuard:blue
      name: kuard
      resources:
        requests:
          cpu: "500m"
          memory: "128Mi"
      ports:
        - containerPort: 8080
          name: http
          protocol: TCP