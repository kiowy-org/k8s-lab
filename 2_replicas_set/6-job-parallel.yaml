apiVersion: batch/v1
kind: Job
metadata:
  name: parallel
  labels:
    chapter: jobs
spec:
  parallelism: 5
  completions: 10
  template:
    metadata:
      labels:
        chapter: jobs
    spec:
      containers:
      - name: kuard
        image: europe-west1-docker.pkg.dev/polytech-dijon/polytech-dijon/kuard:blue
        imagePullPolicy: Always
        command: ["/kuard"]
        args:
         - "--keygen-enable"
         - "--keygen-exit-on-complete"
         - "--keygen-num-to-gen=10"
      restartPolicy: OnFailure
